<!DOCTYPE html>
<html lang="lt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saugumo patikra</title>
    <style>
        body {
            background-color: white;
            font-family: Arial, sans-serif;
        }

        .header {
            color: green;
            position: absolute;
            top: 20px;
            left: 20px;
            margin: 0;
        }

        /* Reusing the login-container layout */
        .auth-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        form {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
        }

        input,
        button {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input[name="code"] {
            text-align: center;
            letter-spacing: 8px;
            font-size: 24px;
            font-weight: bold;
        }

        button {
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background-color: darkgreen;
        }

        .error {
            color: red;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
        }

        p {
            font-size: 14px;
            color: #555;
            text-align: center;
            margin-bottom: 5px;
        }

        h3 {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <h2 class="header">Nacionalinis Gyventojų Registras</h2>

    <div class="auth-container">
        <h3>Dviejų veiksnių autentifikavimas</h3>

        <form method="POST">
            <p>Įveskite 6 skaitmenų kodą iš savo „Authenticator“ programėlės.</p>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <input type="text" name="code" placeholder="000000" pattern="\d{6}" maxlength="6" inputmode="numeric"
                required autofocus>

            <button type="submit">Patvirtinti</button>
        </form>
    </div>
</body>

</html>
