<!DOCTYPE html>
<html lang="lt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saugumo patikra</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/stylesheet.css') }}?v=5">
    <script src="{{ url_for('static', filename='js/theme.js') }}?v=5"></script>
</head>

<body>
    <h2 class="header">Nacionalinis Gyventojų Registras</h2>
    <button class="theme-btn" onclick="toggleTheme()"></button>
    <div class="auth-container">
        <h3>Dviejų veiksnių autentifikavimas</h3>

        <form method="POST">
            <p>Įveskite 6 skaitmenų kodą iš savo „Authenticator“ programėlės.</p>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <input type="text" name="code" placeholder="000000" pattern="\d{6}" maxlength="6" inputmode="numeric"
                required autofocus>

            <button type="submit">Patvirtinti</button>
        </form>
    </div>
</body>

</html>
