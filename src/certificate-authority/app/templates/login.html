<!doctype html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prisijungti</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <h2 class="navbar bg-body-secondary">WalletBy liudijimų įstaiga</h2>
    <div class="container-sm w-25">
      <h3>Prisijungimas</h3>
      <form method="POST" action="/login">
        {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}
        <label for="username" class="form-label">Naudotojo vardas</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="test123"
          class="form-control"
          required
        />
        <label for="password" class="form-label">Slaptažodis</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          required
        />
        <br />
        <button type="submit" class="btn btn-primary mb-3">Prisijungti</button>
      </form>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
