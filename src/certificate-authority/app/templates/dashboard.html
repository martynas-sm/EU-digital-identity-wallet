<!doctype html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mano Liudijimai</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <h2 class="navbar bg-body-secondary">WalletBy liudijimų įstaiga</h2>
    <div class="container-sm w-50">
      <div class="card">
        <h3 class="card-title">Mano liudijimai</h3>

        <div class="card-body">
          {% if uuid is defined %}
          <h4>
            Parašo liudijimą (sertifikatą) galite atsiimti į dėklę įterpę šį
            kodą:
          </h4>
          <div class="text-bg-info p-3">{{uuid}}</div>
          {% else %}
          <a href="/get_sign_url" class="btn btn-primary"
            >Generuoti pasirašymo nuorodą</a
          >
          {% endif %}
        </div>
        <br />
        <a href="/logout" class="btn btn-danger">Atsijungti</a>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
