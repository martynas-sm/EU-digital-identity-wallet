services:
  relying-party:
    volumes:
      - ./relying-party/app:/app
      - /app/node_modules

  trusted-list:
    volumes:
      - ./trusted-list/app:/app
    command: sh -c 'update-ca-certificates && hypercorn app:app --bind "0.0.0.0:8000" --reload'

  pid-provider:
    volumes:
      - ./pid-provider/app:/app

  pid-db:
    ports:
      - "5433:5432"

  wallet-backend:
    volumes:
      - ./wallet-backend:/app
    environment:
      - QUART_ENV=development
      - QUART_APP=app.app:app
    ports:
      - "5678:5678"
    command: sh -c "uv run python -m debugpy --listen 0.0.0.0:5678 -m quart run --host 0.0.0.0 --port 8000"

  wallet-frontend:
    image: node:25-alpine
    working_dir: /app
    volumes:
      - ./wallet-frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8000"
