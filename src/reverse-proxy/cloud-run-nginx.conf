# This configuration is used ONLY for Cloud Run deployment.
# Cloud Run exposes port 8080.
server {
    listen 8080;
    server_name _;

    # FIX: Prevent Nginx from appending internal port 8080 to redirects
    port_in_redirect off;
    absolute_redirect off;

    # Enable sub_filter to rewrite hardcoded .test URLs in JS/JSON/HTML files
    sub_filter_types *;
    sub_filter_once off;
    sub_filter 'https://wallet-backend.wallet.test' '/proxy/wallet-backend';
    sub_filter 'https://public.trusted-list.wallet.test' '/proxy/public-trusted-list';
    sub_filter 'https://public.relying-party.wallet.test' '/proxy/public-relying-party';
    sub_filter 'https://relying-party.wallet.test' '/proxy/relying-party';
    sub_filter 'https://pid-provider.wallet.test' '/proxy/pid-provider';
    sub_filter 'https://public.pid-provider.wallet.test' '/proxy/public-pid-provider';
    sub_filter 'https://ca.wallet.test' '/proxy/ca';

    # Default headers for all proxied requests
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding ""; # Disable compression for sub_filter

    # --- FRONTEND (Default) ---
    location / {
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host wallet-frontend.wallet.test;
        proxy_redirect https://wallet-frontend.wallet.test/ /;
        proxy_cookie_domain wallet-frontend.wallet.test $host;
    }

    # Redirects for missing trailing slashes
    location ~ ^/proxy/(wallet-backend|public-trusted-list|public-relying-party|relying-party|pid-provider|public-pid-provider|trusted-list|ca)$ {
        return 301 $uri/;
    }

    # --- SERVICE PROXIES ---
    location /proxy/wallet-backend/ {
        rewrite ^/proxy/wallet-backend/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host wallet-backend.wallet.test;
        proxy_redirect https://wallet-backend.wallet.test/ /proxy/wallet-backend/;
        proxy_redirect / /proxy/wallet-backend/;
        proxy_cookie_domain wallet-backend.wallet.test $host;
        proxy_cookie_path / /proxy/wallet-backend/;
    }

    location /proxy/public-trusted-list/ {
        rewrite ^/proxy/public-trusted-list/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host public.trusted-list.wallet.test;
        proxy_redirect https://public.trusted-list.wallet.test/ /proxy/public-trusted-list/;
        proxy_redirect / /proxy/public-trusted-list/;
        proxy_cookie_domain public.trusted-list.wallet.test $host;
        proxy_cookie_path / /proxy/public-trusted-list/;
    }

    location /proxy/public-relying-party/ {
        rewrite ^/proxy/public-relying-party/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host public.relying-party.wallet.test;
        proxy_redirect https://public.relying-party.wallet.test/ /proxy/public-relying-party/;
        proxy_redirect / /proxy/public-relying-party/;
        proxy_cookie_domain public.relying-party.wallet.test $host;
        proxy_cookie_path / /proxy/public-relying-party/;
    }

    location /proxy/relying-party/ {
        rewrite ^/proxy/relying-party/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host relying-party.wallet.test;
        proxy_redirect https://relying-party.wallet.test/ /proxy/relying-party/;
        proxy_redirect / /proxy/relying-party/;
        proxy_cookie_domain relying-party.wallet.test $host;
        proxy_cookie_path / /proxy/relying-party/;
    }

    location /proxy/pid-provider/ {
        rewrite ^/proxy/pid-provider/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host pid-provider.wallet.test;
        proxy_set_header X-Forwarded-Prefix /proxy/pid-provider;
        proxy_redirect https://pid-provider.wallet.test/ /proxy/pid-provider/;
        proxy_redirect / /proxy/pid-provider/;
        proxy_cookie_domain pid-provider.wallet.test $host;
        proxy_cookie_path / /proxy/pid-provider/;
    }

    location /proxy/public-pid-provider/ {
        rewrite ^/proxy/public-pid-provider/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host public.pid-provider.wallet.test;
        proxy_redirect https://public.pid-provider.wallet.test/ /proxy/public-pid-provider/;
        proxy_redirect / /proxy/public-pid-provider/;
        proxy_cookie_domain public.pid-provider.wallet.test $host;
        proxy_cookie_path / /proxy/public-pid-provider/;
    }

    location /proxy/trusted-list/ {
        rewrite ^/proxy/trusted-list/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host trusted-list.wallet.test;
        proxy_redirect https://trusted-list.wallet.test/ /proxy/trusted-list/;
        proxy_redirect / /proxy/trusted-list/;
        proxy_cookie_domain trusted-list.wallet.test $host;
        proxy_cookie_path / /proxy/trusted-list/;
    }

    location /proxy/ca/ {
        rewrite ^/proxy/ca/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8006;
        proxy_set_header Host ca.wallet.test;
        proxy_redirect https://ca.wallet.test/ /proxy/ca/;
        proxy_redirect / /proxy/ca/;
        proxy_cookie_domain ca.wallet.test $host;
        proxy_cookie_path / /proxy/ca/;
    }
}
