# This configuration is used ONLY for Cloud Run deployment.
# Cloud Run exposes port 8080.
server {
    listen 8080;
    server_name _;

    # FIX: Prevent Nginx from appending internal port 8080 to redirects
    port_in_redirect off;
    absolute_redirect off;

    # Enable sub_filter to rewrite hardcoded .test URLs in JS/JSON/HTML files
    sub_filter_types *;
    sub_filter_once off;
    sub_filter 'https://wallet-backend.wallet.test' '/wallet-backend';
    sub_filter 'https://public.trusted-list.wallet.test' '/public-trusted-list';
    sub_filter 'https://public.relying-party.wallet.test' '/public-relying-party';
    sub_filter 'https://relying-party.wallet.test' '/relying-party';
    sub_filter 'https://pid-provider.wallet.test' '/pid-provider';
    sub_filter 'https://public.pid-provider.wallet.test' '/public-pid-provider';
    sub_filter 'https://ca.wallet.test' '/ca';

    # Default headers for all proxied requests
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding ""; # Disable compression for sub_filter

    # --- FRONTEND (Default) ---
    location /wallet-frontend/ {
        rewrite ^/wallet-frontend/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8005;
        proxy_set_header Host wallet-frontend.wallet.test;
        proxy_redirect https://wallet-frontend.wallet.test/ /wallet-frontend/;
        proxy_redirect / /wallet-frontend/;
        proxy_cookie_domain wallet-frontend.wallet.test $host;
        proxy_cookie_path / /wallet-frontend/;
    }

    # Add root location for index page
    location = / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Redirects for missing trailing slashes
    location ~ ^/(wallet-frontend|wallet-backend|public-trusted-list|public-relying-party|relying-party|pid-provider|public-pid-provider|trusted-list|ca)$ {
        return 301 $uri/;
    }

    # --- SERVICE PROXIES ---
    location /wallet-backend/ {
        rewrite ^/wallet-backend/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8004;
        proxy_set_header Host wallet-backend.wallet.test;
        proxy_redirect https://wallet-backend.wallet.test/ /wallet-backend/;
        proxy_redirect / /wallet-backend/;
        proxy_cookie_domain wallet-backend.wallet.test $host;
        proxy_cookie_path / /wallet-backend/;
    }

    location /public-trusted-list/ {
        rewrite ^/public-trusted-list/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host public.trusted-list.wallet.test;
        proxy_redirect https://public.trusted-list.wallet.test/ /public-trusted-list/;
        proxy_redirect / /public-trusted-list/;
        proxy_cookie_domain public.trusted-list.wallet.test $host;
        proxy_cookie_path / /public-trusted-list/;
    }

    location /public-relying-party/ {
        rewrite ^/public-relying-party/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host public.relying-party.wallet.test;
        proxy_redirect https://public.relying-party.wallet.test/ /public-relying-party/;
        proxy_redirect / /public-relying-party/;
        proxy_cookie_domain public.relying-party.wallet.test $host;
        proxy_cookie_path / /public-relying-party/;
    }

    location /relying-party/ {
        rewrite ^/relying-party/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host relying-party.wallet.test;
        proxy_redirect https://relying-party.wallet.test/ /relying-party/;
        proxy_redirect / /relying-party/;
        proxy_cookie_domain relying-party.wallet.test $host;
        proxy_cookie_path / /relying-party/;
    }

    location /pid-provider/ {
        rewrite ^/pid-provider/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host pid-provider.wallet.test;
        proxy_set_header X-Forwarded-Prefix /pid-provider;
        proxy_redirect https://pid-provider.wallet.test/ /pid-provider/;
        proxy_redirect / /pid-provider/;
        proxy_cookie_domain pid-provider.wallet.test $host;
        proxy_cookie_path / /pid-provider/;
    }

    location /public-pid-provider/ {
        rewrite ^/public-pid-provider/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host public.pid-provider.wallet.test;
        proxy_redirect https://public.pid-provider.wallet.test/ /public-pid-provider/;
        proxy_redirect / /public-pid-provider/;
        proxy_cookie_domain public.pid-provider.wallet.test $host;
        proxy_cookie_path / /public-pid-provider/;
    }

    location /trusted-list/ {
        rewrite ^/trusted-list/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host trusted-list.wallet.test;
        proxy_redirect https://trusted-list.wallet.test/ /trusted-list/;
        proxy_redirect / /trusted-list/;
        proxy_cookie_domain trusted-list.wallet.test $host;
        proxy_cookie_path / /trusted-list/;
    }

    location /ca/ {
        rewrite ^/ca/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8006;
        proxy_set_header Host ca.wallet.test;
        proxy_redirect https://ca.wallet.test/ /ca/;
        proxy_redirect / /ca/;
        proxy_cookie_domain ca.wallet.test $host;
        proxy_cookie_path / /ca/;
    }
}
